<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ApexENEM - Abrir corrigido</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#090b14;color:#f8fafc;font-family:system-ui,Segoe UI,sans-serif;padding:24px}
    .card{max-width:560px;background:#121624;border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:28px;box-shadow:0 22px 70px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:24px}p{color:#cbd5e1;line-height:1.5}button,a{display:inline-flex;margin-top:14px;background:#7c3aed;color:white;border:0;border-radius:14px;padding:12px 16px;font-weight:700;text-decoration:none;cursor:pointer}
    small{display:block;margin-top:14px;color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <h1>Abrindo ApexENEM corrigido...</h1>
    <p>Estou limpando cache antigo e desativando service worker velho para os botões voltarem a funcionar.</p>
    <button id="openBtn" type="button">Abrir agora</button>
    <small>Se não abrir sozinho em 2 segundos, clique no botão.</small>
  </div>
  <script>
    async function limparEAbrir(){
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch(e) {}
      location.href = './index.html?apex_corrigido=' + Date.now();
    }
    document.getElementById('openBtn').addEventListener('click', limparEAbrir);
    setTimeout(limparEAbrir, 800);
  </script>
</body>
</html>
